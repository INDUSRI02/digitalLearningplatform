{% extends "base.html" %}
{% block content %}
{% load static %}
{% load i18n %}

<style>
    .otp-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, var(--brand-light) 0%, #e8f5e9 100%);
    }

    .otp-card {
        width: 100%;
        max-width: 420px;
        border: none;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(27, 94, 32, 0.1);
        background: white;
        padding: 40px;
        text-align: center;
        position: relative;
        overflow: hidden;
    }

    /* Decorative Brand Pattern */
    .otp-card::before {
        content: "";
        position: absolute;
        top: -50px;
        right: -50px;
        width: 100px;
        height: 100px;
        background: var(--brand-accent);
        opacity: 0.1;
        border-radius: 50%;
    }

    .card-header-icon {
        font-size: 50px;
        color: var(--brand-primary);
        margin-bottom: 20px;
        transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .otp-card:hover .card-header-icon {
        transform: scale(1.1) rotate(10deg);
    }

    .otp-card h6 {
        font-family: 'Playfair Display', serif;
        color: var(--brand-primary);
        font-weight: 800;
        font-size: 20px;
        margin-bottom: 25px;
    }

    .otp-inputs input {
        width: 50px;
        height: 60px;
        font-size: 24px;
        font-weight: 700;
        text-align: center;
        margin: 0 8px;
        border-radius: 12px;
        border: 2px solid #eee;
        background-color: #f9f9f9;
        transition: all 0.3s ease;
    }

    .otp-inputs input:focus {
        background-color: white;
        border-color: var(--brand-accent);
        box-shadow: 0 0 10px rgba(255, 160, 0, 0.15);
        outline: none;
        transform: scale(1.05);
    }

    .btn-validate {
        border-radius: 50px;
        padding: 12px 45px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: white;
        background-color: var(--brand-primary);
        border: none;
        width: 100%;
        margin-top: 30px;
        transition: 0.4s;
    }

    .btn-validate:hover {
        background-color: var(--brand-accent);
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(255, 160, 0, 0.3);
    }

    .resend-text {
        margin-top: 25px;
        font-size: 0.9rem;
        color: #666;
    }

    .resend-link {
        color: var(--brand-primary);
        font-weight: 700;
        text-decoration: none;
    }

    .resend-link:hover {
        color: var(--brand-accent);
    }
</style>

<div class="container-fluid otp-section py-5">
    <div class="otp-card wow zoomIn" data-wow-delay="0.1s">
        <div class="card-header-icon">
            <i class="fas fa-user-shield"></i>
        </div>
        
        <h6>
            {% trans "Verify Your Account" %} <br>
            <span class="text-muted small fw-normal">{% trans "Check your registered email/phone for the OTP" %}</span>
        </h6>
        
        <form method="POST" action="{% url 'user_otp' %}">
            {% csrf_token %}
            <div id="otp-inputs" class="otp-inputs d-flex justify-content-center">
                <input class="form-control" type="text" name="first" maxlength="1" required autocomplete="off" autofocus />
                <input class="form-control" type="text" name="second" maxlength="1" required autocomplete="off" />
                <input class="form-control" type="text" name="third" maxlength="1" required autocomplete="off" />
                <input class="form-control" type="text" name="fourth" maxlength="1" required autocomplete="off" />
            </div>
            
            <button class="btn btn-validate shadow" type="submit">
                {% trans "Validate & Login" %} <i class="fas fa-sign-in-alt ms-2"></i>
            </button>
        </form>

        <p class="resend-text">
            {% trans "Didn't receive the code?" %} <br>
            <a href="#" class="resend-link">{% trans "Resend OTP" %}</a>
        </p>
    </div>
</div>

<script>
    const inputs = document.querySelectorAll('#otp-inputs input');
    inputs.forEach((input, index) => {
        input.addEventListener('keyup', (e) => {
            if (e.target.value.length === 1 && index < inputs.length - 1) {
                inputs[index + 1].focus();
            }
            if (e.key === 'Backspace' && index > 0) {
                inputs[index - 1].focus();
            }
        });
    });
</script>

{% endblock %}

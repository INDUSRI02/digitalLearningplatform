{% extends "base.html" %}
{% block content %}
{% load static %}

<style>
    .login-wrapper {
        background: linear-gradient(135deg, #f8faf9 0%, #e8f5e9 100%);
        min-height: 90vh;
        display: flex;
        align-items: center;
        position: relative;
        overflow: hidden;
    }

    /* Decorative Brand Shapes */
    .shape-1 {
        height: 300px;
        width: 300px;
        top: -100px;
        right: -100px;
        background: var(--brand-accent);
        opacity: 0.1;
        position: absolute;
        border-radius: 50%;
    }

    .shape-2 {
        height: 200px;
        width: 200px;
        bottom: -50px;
        left: -50px;
        background: var(--brand-primary);
        opacity: 0.05;
        position: absolute;
        border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
    }

    .bg-glass-premium {
        background-color: rgba(255, 255, 255, 0.9) !important;
        backdrop-filter: blur(20px);
        border-radius: 25px;
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 20px 40px rgba(27, 94, 32, 0.1);
    }

    .login-image-box {
        position: relative;
        border-radius: 30px;
        overflow: hidden;
        box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        border: 8px solid white;
    }

    .form-label {
        color: var(--brand-primary);
        font-weight: 700;
        font-size: 0.9rem;
        margin-bottom: 8px;
    }

    .form-control-lg {
        border-radius: 12px;
        border: 2px solid #eee;
        padding: 12px 20px;
        font-size: 1rem;
        transition: 0.3s;
    }

    .form-control-lg:focus {
        border-color: var(--brand-accent);
        box-shadow: 0 0 15px rgba(255, 160, 0, 0.1);
    }

    .btn-signin {
        background: var(--brand-primary);
        color: white;
        border: none;
        border-radius: 50px;
        padding: 15px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.4s;
    }

    .btn-signin:hover {
        background: var(--brand-accent);
        transform: translateY(-3px);
        box-shadow: 0 10px 20px rgba(255, 160, 0, 0.2);
        color: white;
    }

    .social-btn {
        width: 45px;
        height: 45px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #f8f9fa;
        color: var(--brand-primary);
        margin: 0 5px;
        transition: 0.3s;
        border: 1px solid #eee;
    }

    .social-btn:hover {
        background: var(--brand-primary);
        color: white;
        transform: translateY(-3px);
    }
</style>

<div class="login-wrapper py-5">
    <div class="shape-1"></div>
    <div class="shape-2"></div>

    <div class="container px-4 py-5 px-md-5">
        <div class="row gx-lg-5 align-items-center">
            <div class="col-lg-5 d-none d-lg-block wow fadeInLeft" data-wow-delay="0.2s">
                <div class="login-image-box">
                    <img src="{% static 'img/img8.avif' %}" alt="Student Learning" class="img-fluid">
                </div>
            </div>
            
            <div class="col-lg-7 position-relative">
                <div class="card bg-glass-premium wow fadeInRight" data-wow-delay="0.4s">
                    <div class="card-body p-4 p-md-5">
                        <div class="text-center mb-5">
                            <div class="brand-icon-box mx-auto mb-3" style="width: 50px; height: 50px;">
                                <i class="fas fa-user-graduate text-white"></i>
                            </div>
                            <h2 style="font-family: 'Playfair Display', serif; font-weight: 900; color: var(--brand-primary);">Student Login</h2>
                            <p class="text-muted small">Welcome back! Please enter your details to continue learning.</p>
                        </div>

                        <form method="POST" enctype="multipart/form-data">
                            {% csrf_token %}
                            
                            <div class="form-outline mb-4">
                                <label class="form-label" for="email">Email address</label>
                                <input type="email" id="email" class="form-control form-control-lg" placeholder="yourname@email.com" name="email" required />
                            </div>

                            <div class="form-outline mb-4">
                                <label class="form-label" for="password">Password</label>
                                <input type="password" id="password" class="form-control form-control-lg" name="password" placeholder="••••••••" required />
                            </div>

                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="remember" checked />
                                    <label class="form-check-label small text-muted" for="remember">Remember me</label>
                                </div>
                                <a href="#" class="small fw-bold text-decoration-none" style="color: var(--brand-primary);">Forgot Password?</a>
                            </div>

                            <button type="submit" class="btn btn-signin w-100 mb-4">
                                Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                            </button>

                            <div class="text-center">
                                <p class="text-muted small">Don't have an account yet? 
                                    <a href="{% url 'user_register' %}" class="fw-bold text-decoration-none" style="color: var(--brand-accent);">Sign Up</a>
                                </p>
                                
                                <div class="mt-4">
                                    <span class="text-muted small d-block mb-3">Or continue with</span>
                                    <a href="#" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                                    <a href="#" class="social-btn"><i class="fab fa-google"></i></a>
                                    <a href="#" class="social-btn"><i class="fab fa-twitter"></i></a>
                                    <a href="#" class="social-btn"><i class="fab fa-github"></i></a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}

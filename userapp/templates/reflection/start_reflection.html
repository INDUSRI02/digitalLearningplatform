{% extends 'base_dashboard.html' %}
{% load static %}
{% block content %}

<style>
    .reflection-selection-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8faf9 0%, #e8f5e9 100%);
        padding: 60px 0;
    }

    .selection-card {
        background: white;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(27, 94, 32, 0.1);
        border-top: 6px solid var(--brand-primary);
        padding: 45px;
        width: 100%;
        max-width: 650px;
        text-align: center;
        transition: transform 0.3s ease;
    }

    .selection-card:hover {
        transform: translateY(-5px);
    }

    .history-link {
        display: inline-block;
        background: rgba(255, 160, 0, 0.1);
        color: var(--brand-primary);
        padding: 8px 20px;
        border-radius: 50px;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.85rem;
        margin-bottom: 30px;
        transition: 0.3s;
        border: 1px solid transparent;
    }

    .history-link:hover {
        background: var(--brand-accent);
        color: white;
        transform: scale(1.05);
    }

    .selection-title {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        color: var(--brand-primary);
        font-size: 2.5rem;
        margin-bottom: 15px;
    }

    .form-label-scholarly {
        font-weight: 700;
        color: var(--brand-primary);
        margin-bottom: 15px;
        display: block;
        font-size: 1.1rem;
    }

    .custom-select-premium {
        border: 2px solid #eee;
        border-radius: 15px;
        padding: 15px;
        font-weight: 600;
        color: var(--text-main);
        background-color: #fdfdfd;
        transition: 0.3s;
        cursor: pointer;
        font-size: 1.1rem;
    }

    .custom-select-premium:focus {
        border-color: var(--brand-accent);
        background-color: white;
        box-shadow: 0 0 15px rgba(255, 160, 0, 0.1);
        outline: none;
    }

    .btn-generate {
        background-color: var(--brand-primary);
        border: none;
        border-radius: 50px;
        padding: 18px 50px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.4s;
        color: white;
        box-shadow: 0 10px 20px rgba(27, 94, 32, 0.2);
    }

    .btn-generate:hover {
        background-color: var(--brand-accent);
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(255, 160, 0, 0.3);
        color: white;
    }

    .selection-icon {
        font-size: 3rem;
        color: var(--brand-accent);
        margin-bottom: 20px;
    }
</style>

<div class="container-fluid reflection-selection-section">
    <div class="selection-card wow zoomIn" data-wow-delay="0.1s">
        
        <a href="{% url 'view_feedback' %}" class="history-link shadow-sm">
            <i class="fas fa-history me-2"></i> View Your Journey History
        </a>

        <div class="selection-icon">
            <i class="fas fa-seedling"></i>
        </div>

        <h2 class="selection-title">Begin Your Reflection</h2>
        <p class="text-muted mb-5 lead">Select a focus area to generate a question that helps you explore your personal growth.</p>

        <form method="POST" action="{% url 'generate_question' %}">
            {% csrf_token %}
            
            <div class="form-group text-start mb-5">
                <label for="category" class="form-label-scholarly text-center">Choose an area of focus:</label>
                <select id="category" name="category" class="form-select custom-select-premium" required>
                    <option value="Personal Growth">🌱 Personal Growth</option>
                    <option value="Emotions & Well-being">🌈 Emotions & Well-being</option>
                    <option value="Life Goals & Purpose">🎯 Life Goals & Purpose</option>
                    <option value="Relationships & Social Life">🤝 Relationships & Social Life</option>
                </select>
            </div>
            
            <button type="submit" class="btn btn-generate">
                Generate My Question <i class="fas fa-magic ms-2"></i>
            </button>
        </form>

        <div class="mt-5">
            <a href="{% url 'user_dashboard' %}" class="text-muted small text-decoration-none">
                <i class="fas fa-chevron-left me-1"></i> Return to Arena
            </a>
        </div>
    </div>
</div>

{% endblock %}

{% extends 'base_dashboard.html' %}
{% load static %}
{% block content %}

<style>
    .question-section {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8faf9 0%, #e8f5e9 100%);
        padding: 60px 0;
    }

    .writing-journal-card {
        background: white;
        border-radius: 25px;
        box-shadow: 0 15px 40px rgba(27, 94, 32, 0.1);
        border-top: 8px solid var(--brand-primary);
        padding: 50px;
        width: 100%;
        max-width: 750px;
        text-align: center;
        position: relative;
    }

    .category-label {
        background: var(--brand-accent);
        color: white;
        padding: 6px 20px;
        border-radius: 50px;
        font-size: 0.85rem;
        font-weight: 800;
        text-transform: uppercase;
        display: inline-block;
        margin-bottom: 20px;
        box-shadow: 0 4px 10px rgba(255, 160, 0, 0.2);
    }

    .question-text {
        font-family: 'Playfair Display', serif;
        font-weight: 900;
        color: var(--brand-primary);
        font-size: 2.2rem;
        line-height: 1.3;
        margin-bottom: 30px;
    }

    .journal-textarea {
        border: 2px solid #eee;
        border-radius: 15px;
        padding: 25px;
        font-size: 1.1rem;
        line-height: 1.7;
        transition: 0.3s;
        background-color: #fdfdfd;
        color: var(--text-main);
        min-height: 200px;
    }

    .journal-textarea:focus {
        border-color: var(--brand-primary);
        background-color: #fff;
        box-shadow: 0 10px 25px rgba(27, 94, 32, 0.08);
        outline: none;
    }

    .btn-submit-reflection {
        background-color: var(--brand-primary);
        border: none;
        border-radius: 50px;
        padding: 18px 60px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: 0.4s;
        color: white;
        box-shadow: 0 10px 20px rgba(27, 94, 32, 0.2);
    }

    .btn-submit-reflection:hover {
        background-color: var(--brand-accent);
        transform: translateY(-3px);
        box-shadow: 0 15px 30px rgba(255, 160, 0, 0.3);
    }

    .helper-text {
        font-size: 0.9rem;
        color: #888;
        margin-top: 15px;
        font-style: italic;
    }
</style>

<div class="container-fluid question-section">
    <div class="writing-journal-card wow fadeInUp" data-wow-delay="0.1s">
        
        <span class="category-label animate__animated animate__fadeInDown">
            <i class="fas fa-bookmark me-2"></i> {{ category }}
        </span>

        <h2 class="question-text animate__animated animate__fadeIn">
            {{ question }}
        </h2>

        <form method="POST" action="{% url 'submit_answer' %}">
            {% csrf_token %}
            
            <input type="hidden" name="category" value="{{ category }}">
            <input type="hidden" name="question" value="{{ question }}">

            <div class="form-group text-start position-relative">
                <label class="small fw-bold text-muted mb-2 uppercase d-block text-center">Your Thoughts & Reflections:</label>
                <textarea class="form-control journal-textarea shadow-sm" 
                          name="answer" 
                          placeholder="Take a moment to breathe and write honestly..." 
                          required></textarea>
                <p class="helper-text text-center">
                    <i class="fas fa-feather-alt me-1"></i> There are no wrong answers, only your unique perspective.
                </p>
            </div>
            
            <button type="submit" class="btn btn-submit-reflection">
                Submit My Reflection <i class="fas fa-check-circle ms-2"></i>
            </button>
        </form>

        <div class="mt-4">
            <a href="{% url 'start_reflection' %}" class="text-muted small text-decoration-none hover-link">
                <i class="fas fa-redo me-1"></i> Choose a different category
            </a>
        </div>
    </div>
</div>

{% endblock %}
